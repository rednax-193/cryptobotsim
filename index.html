<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Bot Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">Trading Sandbox</p>
        <h1>Crypto Bot Simulator</h1>
      </div>
      <div class="controls">
        <button id="addRuleBtn" class="btn btn-secondary" type="button">Add Rule</button>
        <button id="toggleBotBtn" class="btn btn-primary" type="button">Start Bot</button>
      </div>
    </header>

    <section class="grid">
      <section class="panel market-panel">
        <div class="section-head">
          <h2>Live Market</h2>
          <div class="head-actions">
            <label class="mini-field">
              <span>Chart</span>
              <select id="chartCoinSelect"></select>
            </label>
            <span id="marketStatus" class="status-pill">Bot Paused</span>
          </div>
        </div>
        <div id="coinCards" class="coin-cards"></div>
        <canvas id="priceChart" width="980" height="280"></canvas>
      </section>

      <aside class="panel portfolio-panel">
        <h2>Portfolio</h2>
        <div class="stat-row">
          <span>Cash</span>
          <strong id="cashValue">$0.00</strong>
        </div>
        <div id="portfolioRows" class="portfolio-rows"></div>
        <div class="stat-row total">
          <span>Total Value</span>
          <strong id="totalValue">$0.00</strong>
        </div>
      </aside>
    </section>

    <section class="grid lower-grid">
      <section class="panel rules-panel">
        <h2>Bot Rules</h2>
        <div id="rulesContainer" class="rules-list"></div>
      </section>

      <section class="panel activity-panel">
        <h2>Trade Activity</h2>
        <ul id="activityLog" class="activity-log"></ul>
      </section>
    </section>
  </main>

  <template id="ruleTemplate">
    <article class="rule-card">
      <div class="rule-fields">
        <label>
          Action
          <select data-field="action">
            <option value="buy">Buy</option>
            <option value="sell">Sell</option>
          </select>
        </label>
        <label>
          Coin
          <select data-field="coin"></select>
        </label>
        <label>
          Trigger
          <select data-field="trigger">
            <option value="below">Price Below</option>
            <option value="above">Price Above</option>
          </select>
        </label>
        <label>
          Price
          <input data-field="price" type="number" min="0.000001" step="0.000001" value="100" />
        </label>
        <label>
          Amount (USD for buy, units for sell)
          <input data-field="amount" type="number" min="0.0001" step="0.0001" value="100" />
        </label>
      </div>
      <button data-action="remove" class="btn btn-ghost" type="button">Remove</button>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
